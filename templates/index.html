<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>v2rayN Rules Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #0d1017;
    --panel: #161a23;
    --panel2: #0d1017;
    --border: #262c3a;
    --text: #e6e8ec;
    --muted: #8b94a7;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #10b981;
    --warn: #f59e0b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, "Vazirmatn", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    margin: 0 0 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .status-grid > div {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
  }
  .label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row > input[type=text] { flex: 1; min-width: 180px; }
  input[type=text], select {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button.ghost { background: #232a3a; }
  button.ghost:hover:not(:disabled) { background: #2c3447; }
  button.danger { background: var(--danger); }
  button.danger:hover:not(:disabled) { background: var(--danger-hover); }
  button.small { padding: 5px 10px; font-size: 12px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tabs button {
    flex: 1; background: #1f2533;
  }
  .tabs button.active { background: var(--accent); }
  .list-wrap {
    max-height: 360px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel2);
  }
  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item span { word-break: break-all; }
  .empty { color: var(--muted); text-align: center; padding: 30px 10px; font-size: 13px; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    max-width: 80%;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.warn { border-color: var(--warn); }
  .muted { color: var(--muted); font-size: 11px; }
  .count-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 11px;
    margin-right: 4px;
  }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .commit-msg { font-family: ui-monospace, monospace; font-size: 12px; }
  hr.sep { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span> v2rayN Rules Manager</h1>

  <div class="card" id="subCard" style="display:none">
    <div class="label">Subscription URL برای v2rayN</div>
    <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
      <code id="subUrl" style="flex:1; background:var(--panel2); border:1px solid var(--border); padding:8px 10px; border-radius:6px; font-size:12px; word-break:break-all;"></code>
      <button class="ghost small" onclick="copySubUrl()">📋 کپی</button>
    </div>
    <div class="muted" style="margin-top:6px">
      در v2rayN → Rule Settings → فیلد URL (optional) رو با این پر کن، اسم بذار، بعد «Import Rules From Subscription URL» رو بزن.
    </div>
  </div>

  <div class="card">
    <div class="status-grid">
      <div>
        <div class="label">آخرین commit لوکال</div>
        <div id="localLast">…</div>
      </div>
      <div>
        <div class="label">آخرین commit روی <span id="branchLbl">origin</span></div>
        <div id="remoteLast">…</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="ghost small" onclick="refreshStatus()">🔄 بروزرسانی وضعیت</button>
      <button class="ghost small" onclick="refreshUpstream()">⬇️ به‌روزرسانی لیست‌های آپ‌استریم</button>
      <div style="flex:1"></div>
      <span class="muted" id="upstreamCounts"></span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="domainInput" type="text" placeholder="example.com" autocomplete="off" />
      <select id="listSel">
        <option value="whitelist">Whitelist (Direct)</option>
        <option value="blocklist">Blocklist</option>
      </select>
      <button id="addBtn" onclick="addDomain()">+ اضافه</button>
    </div>
    <div class="muted" style="margin-top:8px">
      هر بار اضافه/حذف ⇒ build + commit + push روی origin
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button id="tabW" class="active" onclick="setTab('whitelist')">
        <span class="count-badge" id="cw">0</span> Whitelist
      </button>
      <button id="tabB" onclick="setTab('blocklist')">
        <span class="count-badge" id="cb">0</span> Blocklist
      </button>
    </div>
    <input id="search" type="text" placeholder="جستجو…" oninput="render()" style="width:100%; margin-bottom:10px;" />
    <div class="list-wrap" id="listEl"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let customs = { whitelist: [], blocklist: [] };
let tab = "whitelist";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.className = "toast"; }, 4000);
}

function fmtCommit(c) {
  if (!c) return '<span class="muted">N/A</span>';
  const when = new Date(c.when);
  const whenStr = isNaN(when) ? c.when : when.toLocaleString();
  return `${whenStr}<br><span class="commit-msg muted">${escapeHtml(c.message)}</span>`;
}

async function loadCustoms() {
  const r = await fetch("/api/customs");
  customs = await r.json();
  document.getElementById("cw").textContent = customs.whitelist.length;
  document.getElementById("cb").textContent = customs.blocklist.length;
  render();
}

async function loadUpstreamCounts() {
  try {
    const r = await fetch("/api/upstream-counts");
    const d = await r.json();
    document.getElementById("upstreamCounts").textContent =
      `آپ‌استریم: ${d.whitelist} whitelist · ${d.blocklist} blocklist`;
  } catch (_) {}
}

async function refreshStatus() {
  try {
    const r = await fetch("/api/status");
    const s = await r.json();
    if (s.branch) document.getElementById("branchLbl").textContent = "origin/" + s.branch;
    document.getElementById("localLast").innerHTML = fmtCommit(s.local_last);
    document.getElementById("remoteLast").innerHTML =
      fmtCommit(s.remote_last) + (s.fetch_ok ? "" : ' <span class="muted">(fetch fail)</span>');
    if (s.subscription_url) {
      document.getElementById("subUrl").textContent = s.subscription_url;
      document.getElementById("subCard").style.display = "";
    }
  } catch (e) {
    toast("خطا در گرفتن وضعیت گیت: " + e.message, "error");
  }
}

async function copySubUrl() {
  const url = document.getElementById("subUrl").textContent;
  try {
    await navigator.clipboard.writeText(url);
    toast("کپی شد", "success");
  } catch (_) {
    // Fallback for non-HTTPS / older browsers
    const ta = document.createElement("textarea");
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("کپی شد", "success"); }
    catch (e) { toast("نتونستم کپی کنم — دستی کپی کن", "error"); }
    document.body.removeChild(ta);
  }
}

function setTab(t) {
  tab = t;
  document.getElementById("tabW").classList.toggle("active", t === "whitelist");
  document.getElementById("tabB").classList.toggle("active", t === "blocklist");
  render();
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const items = customs[tab].filter(d => !q || d.toLowerCase().includes(q));
  const el = document.getElementById("listEl");
  if (!items.length) {
    el.innerHTML = `<div class="empty">${q ? "نتیجه‌ای پیدا نشد" : "خالی"}</div>`;
    return;
  }
  el.innerHTML = items.map(d => `
    <div class="list-item">
      <span>${escapeHtml(d)}</span>
      <button class="danger small" data-d="${escapeHtml(d)}">حذف</button>
    </div>
  `).join("");
  el.querySelectorAll("button[data-d]").forEach(b => {
    b.addEventListener("click", () => removeDomain(b.dataset.d));
  });
}

function gitResultMsg(g) {
  if (!g) return "";
  if (!g.committed) return "بدون تغییر در گیت";
  if (g.pushed) return "✅ commit + push شد";
  return "⚠️ commit شد ولی push نشد: " + (g.error || "");
}

async function addDomain() {
  const domain = document.getElementById("domainInput").value.trim();
  const list = document.getElementById("listSel").value;
  if (!domain) return;
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = "⏳";
  try {
    const r = await fetch("/api/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain, list }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "failed");
    document.getElementById("domainInput").value = "";
    toast(`«${data.domain}» اضافه شد — ${gitResultMsg(data.git)}`,
      data.git && data.git.pushed ? "success" : "warn");
    await loadCustoms();
    await refreshStatus();
  } catch (e) {
    toast("خطا: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

async function removeDomain(domain) {
  if (!confirm(`حذف «${domain}» از ${tab}؟`)) return;
  try {
    const r = await fetch("/api/remove", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain, list: tab }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "failed");
    toast(`«${data.domain}» حذف شد — ${gitResultMsg(data.git)}`,
      data.git && data.git.pushed ? "success" : "warn");
    await loadCustoms();
    await refreshStatus();
  } catch (e) {
    toast("خطا: " + e.message, "error");
  }
}

async function refreshUpstream() {
  if (!confirm("لیست‌های آپ‌استریم دوباره از اینترنت دانلود بشن، build و push بشه؟")) return;
  toast("در حال دانلود و build …", "warn");
  try {
    const r = await fetch("/api/refresh-upstream", { method: "POST" });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "failed");
    toast("آپدیت شد — " + gitResultMsg(data.git),
      data.git && data.git.pushed ? "success" : "warn");
    await loadUpstreamCounts();
    await refreshStatus();
  } catch (e) {
    toast("خطا: " + e.message, "error");
  }
}

document.getElementById("domainInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addDomain();
});

loadCustoms();
loadUpstreamCounts();
refreshStatus();
</script>
</body>
</html>
